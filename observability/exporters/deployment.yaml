apiVersion: apps/v1
kind: Deployment
metadata:
  name: grs-exporter
  namespace: monitoring
  labels:
    app: grs-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grs-exporter
  template:
    metadata:
      labels:
        app: grs-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: grs-exporter
          # Built locally via: docker build -t grs-exporter:latest observability/exporters/
          # Then loaded into KIND: kind load docker-image grs-exporter:latest --name grs
          image: grs-exporter:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9100
              name: metrics
          env:
            - name: RESULTS_DIR
              value: "/results"
            - name: EXPORTER_PORT
              value: "9100"
          volumeMounts:
            - name: results
              mountPath: /results
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 9100
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: results
          # HostPath to the GRS results directory on the KIND node
          # The setup script creates this path on the node
          hostPath:
            path: /grs-results
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: grs-exporter
  namespace: monitoring
  labels:
    app: grs-exporter
spec:
  type: ClusterIP
  ports:
    - port: 9100
      targetPort: 9100
      name: metrics
  selector:
    app: grs-exporter
